services:
  db:
    image: postgres:16-alpine
    container_name: qualitrack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: qualitrack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qualitrack"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
